<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>肿瘤风险评估与用药推荐系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .header-badge {
            text-align: center;
            margin-bottom: 30px;
            color: #3b82f6;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.15);
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 100%);
        }

        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 40px;
        }

        .lang-btn {
            padding: 8px 20px;
            border: 1px solid #e0f2fe;
            border-radius: 20px;
            background: white;
            color: #64748b;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .title-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.1);
        }

        .icon svg {
            width: 40px;
            height: 40px;
        }

        .title {
            font-size: 32px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 16px;
            color: #64748b;
            font-weight: 400;
        }

        .form-section {
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 32px;
        }

        .label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 12px;
        }

        .select-input, .text-input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            color: #1e293b;
            background: #f8fafc;
            transition: all 0.2s ease;
        }

        .select-input:focus, .text-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .gene-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .gene-input {
            text-align: center;
        }

        .calculate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .result-section {
            margin-top: 40px;
            padding: 32px;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 16px;
            border: 1px solid #bfdbfe;
            display: none;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.05);
        }

        .result-title {
            font-size: 14px;
            font-weight: 600;
            color: #3b82f6;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }

        .result-item {
            margin-bottom: 20px;
        }

        .result-label {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .result-value {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
        }

        .risk-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
        }

        .risk-high {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .risk-low {
            background: #dcfce7;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .drug-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }

        .drug-item {
            padding: 10px 16px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            color: #334155;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .footer-note {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: #94a3b8;
        }

        @media (max-width: 768px) {
            .card {
                padding: 40px 24px;
            }

            .gene-inputs {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-badge">肿瘤风险评估 · Cancer Risk Assessment</div>
        
        <div class="card">
            <div class="lang-switch">
                <button id="zh-btn" class="lang-btn active">中文</button>
                <button id="en-btn" class="lang-btn">English</button>
            </div>

            <div class="title-section">
                <div class="icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 3H5C3.89543 3 3 3.89543 3 5V19C3 20.1046 3.89543 21 5 21H19C20.1046 21 21 20.1046 21 19V5C21 3.89543 20.1046 3 19 3Z" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M9 7H7V9H9V7Z" fill="#10b981"/>
                        <path d="M17 7H15V9H17V7Z" fill="#10b981"/>
                        <path d="M12 12C14.2091 12 16 10.2091 16 8C16 5.79086 14.2091 4 12 4C9.79086 4 8 5.79086 8 8C8 10.2091 9.79086 12 12 12Z" stroke="#3b82f6" stroke-width="2"/>
                        <path d="M4 21C4 17.134 7.13401 14 11 14H13C16.866 14 20 17.134 20 21" stroke="#10b981" stroke-width="2"/>
                    </svg>
                </div>
                <h1 id="page-title" class="title">肿瘤风险评估与用药推荐系统</h1>
                <p class="subtitle">Cancer Risk Assessment & Drug Recommendation System</p>
            </div>

            <div class="form-section">
                <div class="form-group">
                    <label id="tumor-type-label" class="label">肿瘤类型</label>
                    <select id="tumor-type" class="select-input"></select>
                </div>

                <div class="form-group">
                    <label id="gene-inputs-label" class="label">基因表达量输入</label>
                    <div class="gene-inputs">
                        <div class="gene-input">
                            <input type="number" id="gprc5b" class="text-input" step="any" placeholder="GPRC5B">
                        </div>
                        <div class="gene-input">
                            <input type="number" id="lsamp" class="text-input" step="any" placeholder="LSAMP">
                        </div>
                        <div class="gene-input">
                            <input type="number" id="pdgfra" class="text-input" step="any" placeholder="PDGFRA">
                        </div>
                    </div>
                </div>

                <button id="calculate-btn" class="calculate-btn">确认计算 · Calculate</button>
            </div>

            <div id="result-section" class="result-section">
                <div class="result-title" id="result-title">计算结果</div>
                
                <div class="result-item">
                    <div class="result-label" id="selected-tumor-label">所选肿瘤类型</div>
                    <div class="result-value" id="selected-tumor-value"></div>
                </div>

                <div class="result-item">
                    <div class="result-label" id="risk-group-label">风险分组</div>
                    <div class="result-value" id="risk-group-value"></div>
                </div>

                <div class="result-item">
                    <div class="result-label" id="recommended-drugs-label">推荐用药（5种）</div>
                    <div class="drug-list" id="recommended-drugs-list"></div>
                </div>
            </div>

            <div class="footer-note">
                * 风险评分在后台计算，不对外展示；所有数据均预内置本地，无需联网
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let currentLang = 'zh';
        
        // 语言切换按钮事件
        document.getElementById('zh-btn').addEventListener('click', function() {
            currentLang = 'zh';
            updateLanguage();
            this.classList.add('active');
            document.getElementById('en-btn').classList.remove('active');
        });
        
        document.getElementById('en-btn').addEventListener('click', function() {
            currentLang = 'en';
            updateLanguage();
            this.classList.add('active');
            document.getElementById('zh-btn').classList.remove('active');
        });
        
        // 初始化肿瘤类型下拉框
        function initTumorTypes() {
            const tumorTypeSelect = document.getElementById('tumor-type');
            tumorTypeSelect.innerHTML = '';
            
            const option = document.createElement('option');
            option.value = '';
            option.textContent = currentLang === 'zh' ? '请选择肿瘤类型' : 'Please select tumor type';
            tumorTypeSelect.appendChild(option);
            
            for (const [code, data] of Object.entries(riskDrugData[currentLang])) {
                const option = document.createElement('option');
                option.value = code;
                option.textContent = data.cancer_type;
                tumorTypeSelect.appendChild(option);
            }
        }
        
        // 更新语言
        function updateLanguage() {
            // 更新页面标题
            document.getElementById('page-title').textContent = currentLang === 'zh' ? '肿瘤风险评估与用药推荐系统' : 'Cancer Risk Assessment & Drug Recommendation System';
            
            // 更新表单标签
            document.getElementById('tumor-type-label').textContent = currentLang === 'zh' ? '肿瘤类型' : 'Tumor Type';
            document.getElementById('gene-inputs-label').textContent = currentLang === 'zh' ? '基因表达量输入' : 'Gene Expression Input';
            
            // 更新按钮文本
            document.getElementById('calculate-btn').textContent = currentLang === 'zh' ? '确认计算 · Calculate' : 'Calculate · 确认计算';
            
            // 更新结果标题
            document.getElementById('result-title').textContent = currentLang === 'zh' ? '计算结果' : 'Calculation Result';
            
            // 更新结果标签
            document.getElementById('selected-tumor-label').textContent = currentLang === 'zh' ? '所选肿瘤类型' : 'Selected Tumor Type';
            document.getElementById('risk-group-label').textContent = currentLang === 'zh' ? '风险分组' : 'Risk Group';
            document.getElementById('recommended-drugs-label').textContent = currentLang === 'zh' ? '推荐用药（5种）' : 'Recommended Drugs (5)';
            
            // 重新初始化肿瘤类型下拉框
            initTumorTypes();
        }
        
        // 计算按钮事件
        document.getElementById('calculate-btn').addEventListener('click', function() {
            const tumorType = document.getElementById('tumor-type').value;
            const gprc5b = parseFloat(document.getElementById('gprc5b').value);
            const lsamp = parseFloat(document.getElementById('lsamp').value);
            const pdgfra = parseFloat(document.getElementById('pdgfra').value);
            
            // 验证输入
            if (!tumorType) {
                alert(currentLang === 'zh' ? '请选择肿瘤类型' : 'Please select tumor type');
                return;
            }
            
            if (isNaN(gprc5b) || isNaN(lsamp) || isNaN(pdgfra)) {
                alert(currentLang === 'zh' ? '请输入有效的数值' : 'Please enter valid numbers');
                return;
            }
            
            // 获取肿瘤数据
            const tumorData = riskDrugData[currentLang][tumorType];
            
            // 计算风险评分
            const riskScore = (
                gprc5b * tumorData.GPRC5B_coeff +
                lsamp * tumorData.LSAMP_coeff +
                pdgfra * tumorData.PDGFRA_coeff
            );
            
            // 判定风险分组
            const isHighRisk = riskScore > tumorData.threshold;
            const riskGroup = isHighRisk ? 
                (currentLang === 'zh' ? '高风险组' : 'High-Risk Group') : 
                (currentLang === 'zh' ? '低风险组' : 'Low-Risk Group');
            
            // 获取推荐药物
            const drugs = isHighRisk ? tumorData.high_risk_drugs : tumorData.low_risk_drugs;
            
            // 显示结果
            document.getElementById('selected-tumor-value').textContent = tumorData.cancer_type;
            
            const riskGroupValue = document.getElementById('risk-group-value');
            riskGroupValue.innerHTML = `<span class="risk-badge ${isHighRisk ? 'risk-high' : 'risk-low'}">${riskGroup}</span>`;
            
            const drugsList = document.getElementById('recommended-drugs-list');
            drugsList.innerHTML = '';
            drugs.forEach(drug => {
                const span = document.createElement('span');
                span.className = 'drug-item';
                span.textContent = drug;
                drugsList.appendChild(span);
            });
            
            // 显示结果区域
            document.getElementById('result-section').style.display = 'block';
        });
        
        // 初始化
        function init() {
            initTumorTypes();
        }
        
        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
